site_name: Longpt's Setup-Guide
site_url: https://wwwlongvn.github.io/longpt-setup-guide/
site_description: Giáo trình xây hệ thống wiki AI-first Obsidian + Claude Code đa vault giống Phạm Thành Long. 41 file, 7 phần, từ triết lý đến template copy-paste.
site_author: Phạm Thành Long
repo_url: https://github.com/wwwlongvn/longpt-setup-guide
repo_name: wwwlongvn/longpt-setup-guide
edit_uri: edit/main/
copyright: Copyright © 2026 Phạm Thành Long — MIT License

docs_dir: docs
site_dir: _site

# docs/ folder generated by scripts/build-docs.sh (copies markdown files from root)
# Not committed - .gitignore excludes it

# Validation
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: material
  language: vi
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Chuyển sang tối
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Chuyển sang sáng
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang:
        - vi
        - en
  - roamlinks  # Xử lý wikilink [[Page Name]]

markdown_extensions:
  # Code blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  # Tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Admonitions (callouts)
  - admonition
  - pymdownx.details
  # Tables
  - tables
  # Task lists
  - pymdownx.tasklist:
      custom_checkbox: true
  # Footnotes
  - footnotes
  # Definition lists
  - def_list
  # TOC
  - toc:
      permalink: true
      toc_depth: 3
  # Smart links
  - pymdownx.magiclink
  # Caret/Mark/Tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  # Smarty (smart quotes)
  - pymdownx.smartsymbols
  # Attribute lists
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wwwlongvn
      name: GitHub
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@longguru
      name: YouTube @longguru
    - icon: material/web
      link: https://long.vn
      name: long.vn
  analytics:
    provider: google
    # property: G-XXXXXXXXXX  # Anh thêm GA4 ID nếu có

extra_css:
  - assets/extra.css

